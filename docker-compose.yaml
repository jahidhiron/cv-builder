services:
  # CV Builder API service
  api:
    container_name: ${API_CONTAINER_NAME:-cv-builder-api}
    build:
      context: .
      args:
        NODE_ENV: ${APPLICATION_MODE:-development}
    ports:
      - '${PORT:-8080}:${PORT:-8080}'
    networks:
      - app-network
    restart: always
    environment:
      # App
      PORT: ${PORT:-8080}
      APPLICATION_MODE: ${APPLICATION_MODE:-production}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8080}
      CLIENT_SOCKET_URL: ${CLIENT_SOCKET_URL:-http://localhost:8080}
      # Cloud PostgreSQL (e.g. Neon, Supabase, RDS). Append ?sslmode=require for cloud providers.
      DATABASE_URL: ${DATABASE_URL}
      MIGRATIONS_RUN: ${MIGRATIONS_RUN:-true}
      # RabbitMQ
      RABBITMQ_URI: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      ENABLE_RABBITMQ: ${ENABLE_RABBITMQ:-true}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE:-cv_builder_queue}
      RABBITMQ_MANAGEMENT_UI_PORT: ${RABBITMQ_MANAGEMENT_UI_PORT:-15672}
    depends_on:
      - rabbitmq

  # RabbitMQ service
  rabbitmq:
    container_name: ${RABBITMQ_CONTAINER_NAME:-rabbitmq}
    image: rabbitmq:management
    ports:
      - '15672:15672' # Management UI port
      - '5672:5672' # AMQP port
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-admin}
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
